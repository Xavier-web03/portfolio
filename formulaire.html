<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Contact – Xavier</title>

    <style>
        body{
            background: #0a0a0a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1{
            color: #ff2e63;
            margin-bottom: 20px;
        }

        form{
            background: #111;
            padding: 25px;
            width: 350px;
            border-left: 4px solid #ff2e63;
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
        }

         button{
            margin-top: 20px;
            padding: 10px 25px;
            border: none;
            background: #ff2e63;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0,3s;
        }


        button:hover{
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>Me Contacter</h1>

    <form action="kouameyaoxavier9@gmail.com" method="post">
        <input type="text" placeholder="Votre nom" required>
        <input type="email" placeholder="Votre email" required>
        <textarea placeholder="Votre message" rows="5" required></textarea>
        <button type="submit">Envoyer</button>
    </form>
    <a href="portfolio.html" style="color:#ff2e63; text-decoration:none;">← Retour à l'accueil</a>

</body>
</html>
